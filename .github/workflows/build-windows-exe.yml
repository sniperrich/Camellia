name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: release
            console_mode: disable
          - variant: debug
            console_mode: force

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build EXE (${{ matrix.variant }})
        shell: pwsh
        run: |
          $variant = "${{ matrix.variant }}"
          $consoleMode = "${{ matrix.console_mode }}"
          $outputName = "camellia_gui-$variant"

          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --windows-console-mode=$consoleMode `
            --include-data-dir=plugins=plugins `
            --output-dir=dist_nuitka `
            --output-filename=$outputName `
            camellia_gui.py

      - name: Inspect build output (${{ matrix.variant }})
        shell: pwsh
        run: |
          Write-Host "Listing dist_nuitka after build:"
          if (Test-Path "dist_nuitka") {
            Get-ChildItem -Path "dist_nuitka" -Force | Format-Table -AutoSize
          } else {
            Write-Host "dist_nuitka not found."
          }

      - name: Zip artifact (${{ matrix.variant }})
        shell: pwsh
        run: |
          $variant = "${{ matrix.variant }}"
          $outputName = "camellia_gui-$variant"
          $distDir = ""
          $zipPath = "dist_nuitka/$outputName-win64.zip"

          $candidates = @(
            "dist_nuitka/$outputName.dist",
            "dist_nuitka/camellia_gui.dist"
          )
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              $distDir = $candidate
              break
            }
          }

          if (-not $distDir) {
            $auto = Get-ChildItem -Path "dist_nuitka" -Directory -Filter "*.dist" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($auto) {
              $distDir = $auto.FullName
            }
          }

          if (-not $distDir) {
            throw "No .dist directory found under dist_nuitka."
          }

          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Write-Host "Using dist directory: $distDir"
          Compress-Archive -Path "$distDir/*" -DestinationPath $zipPath

      - name: Upload artifact (${{ matrix.variant }})
        uses: actions/upload-artifact@v4
        with:
          name: camellia_gui-${{ matrix.variant }}-win64
          path: dist_nuitka/camellia_gui-${{ matrix.variant }}-win64.zip
          if-no-files-found: error

      - name: Upload to Release (${{ matrix.variant }})
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist_nuitka/camellia_gui-${{ matrix.variant }}-win64.zip
